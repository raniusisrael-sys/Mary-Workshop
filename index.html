<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mary Two Wheelar Workshop</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycbyOzAZoSlxeTHk0A2uEM8Ehsc8aKSgDeSd3eNvi1r7ylDkYHLVH144PdeHH1hkw0i0/exec";

        function App() {
            // === SHOP SETTINGS ===
            const upiID = "raniusisrael@okicici"; // <-- ADD UPI ID HERE
            const shopName = "Mary Two Wheelar Workshop";
            const verses = [
                '"The Lord is my shepherd; I shall not want." - Psalm 23:1',
                '"I can do all things through Christ who strengthens me." - Philippians 4:13',
                '"For with God nothing will be impossible." - Luke 1:37',
                '"Commit to the Lord whatever you do, and he will establish your plans." - Proverbs 16:3',
                '"The Lord bless you and keep you." - Numbers 6:24'
            ];
            const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
            const dailyVerse = verses[dayOfYear % verses.length];

            const [currentScreen, setCurrentScreen] = useState('splash'); 

            // Form States
            const [editingBillId, setEditingBillId] = useState(null); 
            const [billDate, setBillDate] = useState(new Date().toISOString()); 
            const [customerName, setCustomerName] = useState('');
            const [phone, setPhone] = useState('');
            const [vehicleModel, setVehicleModel] = useState('');
            const [vehicleNo, setVehicleNo] = useState('');
            const [items, setItems] = useState([]);
            const [selectedItem, setSelectedItem] = useState('');
            const [itemPrice, setItemPrice] = useState('');
            const [cooli, setCooli] = useState('');
            const [advancePaid, setAdvancePaid] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);

            // Database States
            const [allBills, setAllBills] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [isLoadingBills, setIsLoadingBills] = useState(false);

            // Pending Payment Modal States
            const [payModalBill, setPayModalBill] = useState(null);
            const [modalPayAmount, setModalPayAmount] = useState('');
            const [modalPayMethod, setModalPayMethod] = useState('Cash');

            useEffect(() => {
                const handlePopState = (e) => {
                    if (e.state && e.state.screen) setCurrentScreen(e.state.screen);
                };
                window.addEventListener('popstate', handlePopState);
                window.history.replaceState({ screen: 'splash' }, '');
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            const fetchBills = async () => {
                setIsLoadingBills(true);
                try {
                    const response = await fetch(GOOGLE_SHEETS_URL);
                    const json = await response.json();
                    if (json.result === 'success') {
                        setAllBills(json.data.reverse()); 
                    }
                } catch (error) { console.error("Failed to load bills"); }
                setIsLoadingBills(false);
            };

            const navigateTo = async (screenName) => {
                window.history.pushState({ screen: screenName }, '');
                setCurrentScreen(screenName);
                if ((screenName === 'search' || screenName === 'pending') && allBills.length === 0) {
                    fetchBills();
                }
            };

            useEffect(() => {
                if (currentScreen === 'splash') {
                    const timer = setTimeout(() => {
                        window.history.replaceState({ screen: 'dashboard' }, '');
                        setCurrentScreen('dashboard');
                    }, 2500);
                    return () => clearTimeout(timer);
                }
            }, [currentScreen]);

            // Form Logic
            const handleAddItem = (e) => {
                e.preventDefault();
                if (selectedItem && itemPrice) {
                    setItems([...items, { name: selectedItem, price: parseFloat(itemPrice) }]);
                    setSelectedItem(''); setItemPrice('');
                }
            };

            const sparesTotal = items.reduce((sum, item) => sum + item.price, 0);
            const grandTotal = sparesTotal + (parseFloat(cooli) || 0);
            const currentAdvance = parseFloat(advancePaid) || 0; // BUG WAS HERE (Name change)
            const balanceDue = Math.max(0, grandTotal - currentAdvance);
            const paymentStatus = balanceDue > 0 ? 'Pending' : 'Paid';

            const handleSubmitBill = async () => {
                const hasVehicleDetail = customerName.trim() || phone.trim() || vehicleModel.trim() || vehicleNo.trim();
                if(!hasVehicleDetail) return alert("Please enter at least one detail (Name, Phone, Model, or Number)!");
                if(items.length === 0 && !cooli) return alert("Please add at least one spare part or labor charge!");
                
                setIsSubmitting(true);
                
                const itemsString = items.map(i => `${i.name} (₹${i.price})`).join(', ');
                
                const billData = {
                    action: editingBillId ? "update" : "create",
                    billId: editingBillId,
                    customerName, phone, vehicleModel, vehicleNo, 
                    itemsString: itemsString, 
                    itemsArray: items,        
                    sparesTotal, cooli: parseFloat(cooli) || 0,
                    grandTotal, paymentMethod: "Advance", amountPaid: currentAdvance, // BUG FIXED HERE
                    balanceDue, status: paymentStatus
                };

                try {
                    const response = await fetch(GOOGLE_SHEETS_URL, {
                        method: 'POST',
                        body: JSON.stringify(billData),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    const result = await response.json();
                    if(result.result === "success") {
                        setAllBills([]); // Clear cache
                        navigateTo('receipt');
                    } else alert("Error saving to Google Sheets.");
                } catch (error) { alert("Submission failed. Check internet connection."); }
                setIsSubmitting(false);
            };

            const resetForm = () => {
                setEditingBillId(null); setBillDate(new Date().toISOString());
                setCustomerName(''); setPhone(''); setVehicleModel(''); setVehicleNo(''); 
                setItems([]); setCooli(''); setAdvancePaid(''); 
                navigateTo('dashboard');
            };

            const loadBillData = (bill) => {
                setEditingBillId(bill.billId);
                setBillDate(bill.date);
                setCustomerName(bill.customerName);
                setPhone(bill.phone);
                setVehicleModel(bill.vehicleModel);
                setVehicleNo(bill.vehicleNo);
                setCooli(bill.cooli);
                setAdvancePaid(bill.amountPaid);
                try {
                    setItems(JSON.parse(bill.itemsJson));
                } catch(e) { setItems([]); }
            };

            const handleViewBill = (bill) => {
                loadBillData(bill);
                navigateTo('receipt');
            };

            const handleEditBill = (bill) => {
                loadBillData(bill);
                navigateTo('newBill');
            };

            // Process Payment from Pending Screen
            const handleConfirmPayment = async () => {
                if(!modalPayAmount || modalPayAmount <= 0) return alert("Enter a valid amount!");
                setIsSubmitting(true);

                const payVal = parseFloat(modalPayAmount);
                const oldPaid = parseFloat(payModalBill.amountPaid) || 0;
                const newPaid = oldPaid + payVal;
                const newBalance = Math.max(0, parseFloat(payModalBill.grandTotal) - newPaid);
                const newStatus = newBalance > 0 ? 'Pending' : 'Paid';

                const billData = {
                    action: "update",
                    billId: payModalBill.billId,
                    customerName: payModalBill.customerName, 
                    phone: payModalBill.phone, 
                    vehicleModel: payModalBill.vehicleModel, 
                    vehicleNo: payModalBill.vehicleNo, 
                    itemsString: payModalBill.itemsString,
                    itemsArray: JSON.parse(payModalBill.itemsJson || "[]"), 
                    sparesTotal: payModalBill.sparesTotal, 
                    cooli: payModalBill.cooli,
                    grandTotal: payModalBill.grandTotal, 
                    paymentMethod: modalPayMethod, 
                    amountPaid: newPaid,
                    balanceDue: newBalance, 
                    status: newStatus
                };

                try {
                    const response = await fetch(GOOGLE_SHEETS_URL, {
                        method: 'POST',
                        body: JSON.stringify(billData),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    const result = await response.json();
                    if(result.result === "success") {
                        setPayModalBill(null);
                        fetchBills(); // Refresh list to show updated balance
                        alert("Payment successful!");
                    } else alert("Error saving payment.");
                } catch (error) { alert("Payment failed to save."); }
                setIsSubmitting(false);
            };

            const handleShare = async () => {
                const receiptElement = document.getElementById('receipt-capture');
                if (!receiptElement) return;
                try {
                    const canvas = await html2canvas(receiptElement, { scale: 2, useCORS: true, allowTaint: true });
                    canvas.toBlob(async (blob) => {
                        const fileName = customerName ? `Workshop_Bill_${customerName}.png` : `Workshop_Bill.png`;
                        const file = new File([blob], fileName, { type: "image/png" });
                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            await navigator.share({ title: 'Workshop Bill', text: 'Thank you!', files: [file] });
                        } else {
                            const link = document.createElement('a');
                            link.download = fileName;
                            link.href = canvas.toDataURL();
                            link.click();
                        }
                    });
                } catch (error) { alert("Oops, couldn't capture the bill."); }
            };

            const filteredBills = allBills.filter(bill => {
                if (!searchQuery) return true;
                const q = searchQuery.toLowerCase();
                const name = String(bill.customerName || '').toLowerCase();
                const ph = String(bill.phone || '').toLowerCase();
                const model = String(bill.vehicleModel || '').toLowerCase();
                const vNo = String(bill.vehicleNo || '').toLowerCase();
                return name.includes(q) || ph.includes(q) || model.includes(q) || vNo.includes(q); 
            });

            const pendingBills = allBills.filter(bill => parseFloat(bill.balanceDue) > 0);
            const totalPendingAmount = pendingBills.reduce((sum, bill) => sum + parseFloat(bill.balanceDue), 0);

            // ==========================================
            // UI SCREENS
            // ==========================================
            
            if (currentScreen === 'splash') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-black via-gray-900 to-black text-yellow-500">
                        <div className="border-2 border-yellow-600/50 p-8 rounded-full shadow-[0_0_50px_rgba(202,138,4,0.15)] flex flex-col items-center justify-center w-64 h-64">
                            <h1 className="text-3xl font-black tracking-widest uppercase text-center font-serif bg-clip-text text-transparent bg-gradient-to-r from-yellow-300 to-yellow-600">Mary</h1>
                            <div className="h-px w-16 bg-yellow-600/50 my-2"></div>
                            <h2 className="text-sm tracking-widest uppercase text-center text-gray-300">Two Wheelar<br/>Workshop</h2>
                        </div>
                    </div>
                );
            }

            if (currentScreen === 'dashboard') {
                return (
                    <div className="min-h-screen bg-gray-100 p-4 pb-20 max-w-md mx-auto">
                        <div className="bg-gradient-to-r from-blue-600 to-indigo-700 p-6 rounded-3xl shadow-lg text-white mb-8 mt-4">
                            <h1 className="text-2xl font-bold tracking-wide">Mary Two Wheelar</h1>
                            <p className="text-sm opacity-90 mt-1">Dashboard</p>
                        </div>
                        <div className="grid grid-cols-2 gap-4 mb-4">
                            <button onClick={() => { resetForm(); navigateTo('newBill'); }} className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform">
                                <div className="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-2xl font-bold">+</div>
                                <span className="font-semibold text-gray-700">New Bill</span>
                            </button>
                            <button onClick={() => navigateTo('search')} className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform">
                                <div className="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 text-xl font-bold">🔍</div>
                                <span className="font-semibold text-gray-700">Search</span>
                            </button>
                        </div>
                        <button onClick={() => navigateTo('pending')} className="w-full bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex items-center justify-between active:scale-95 transition-transform">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center text-red-600 text-xl font-bold">₹</div>
                                <span className="font-bold text-gray-800 text-lg">Pending Dues</span>
                            </div>
                            <span className="text-gray-400 font-bold">{">"}</span>
                        </button>
                    </div>
                );
            }

            if (currentScreen === 'pending') {
                return (
                    <div className="min-h-screen bg-gray-100 p-4 max-w-md mx-auto pb-20 relative">
                        <div className="flex items-center gap-4 mb-6 mt-2">
                            <button onClick={() => navigateTo('dashboard')} className="w-10 h-10 bg-white rounded-full shadow flex items-center justify-center font-bold text-gray-600 active:scale-95">{"<"}</button>
                            <h1 className="text-xl font-bold text-gray-800">Pending Payments</h1>
                        </div>

                        <div className="bg-gradient-to-r from-red-500 to-red-700 p-6 rounded-3xl shadow-lg text-white mb-6 text-center">
                            <p className="text-sm font-medium opacity-90 mb-1">Total Outstanding Due</p>
                            <h2 className="text-4xl font-black">₹{totalPendingAmount.toFixed(2)}</h2>
                        </div>

                        {isLoadingBills ? (
                            <div className="text-center text-gray-500 mt-10 animate-pulse font-medium">Loading records...</div>
                        ) : (
                            <div className="space-y-3">
                                {pendingBills.length === 0 && <div className="text-center text-gray-500 mt-10">No pending dues! All clear.</div>}
                                
                                {pendingBills.map((bill, idx) => (
                                    <div key={idx} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 border-l-4 border-l-red-500">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <h3 className="font-bold text-gray-800 text-lg">{bill.customerName || 'Unknown'}</h3>
                                                <p className="text-sm text-gray-500">{bill.vehicleModel} {bill.vehicleNo ? `- ${bill.vehicleNo}` : ''}</p>
                                                <p className="text-xs text-gray-400 mt-1">{bill.phone}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="font-black text-red-600 text-xl">₹{bill.balanceDue}</p>
                                                <p className="text-xs text-gray-400 font-medium mt-1">Total: ₹{bill.grandTotal}</p>
                                            </div>
                                        </div>
                                        <button 
                                            onClick={() => { setPayModalBill(bill); setModalPayAmount(bill.balanceDue); setModalPayMethod('Cash'); }}
                                            className="w-full mt-3 bg-red-50 text-red-600 font-bold py-3 rounded-xl border border-red-100 active:scale-95 transition-transform">
                                            Collect Payment
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {payModalBill && (
                            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl relative">
                                    <button onClick={() => setPayModalBill(null)} className="absolute top-4 right-4 w-8 h-8 bg-gray-100 rounded-full font-bold text-gray-500">X</button>
                                    
                                    <h2 className="text-xl font-bold text-gray-800 mb-1">Receive Payment</h2>
                                    <p className="text-sm text-gray-500 mb-6">{payModalBill.customerName} - {payModalBill.vehicleModel}</p>
                                    
                                    <div className="flex gap-2 mb-5">
                                        <button onClick={() => setModalPayMethod('Cash')} className={`w-1/2 py-3 rounded-xl font-bold transition-colors ${modalPayMethod === 'Cash' ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-100 text-gray-600'}`}>Cash</button>
                                        <button onClick={() => setModalPayMethod('QR')} className={`w-1/2 py-3 rounded-xl font-bold transition-colors ${modalPayMethod === 'QR' ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-100 text-gray-600'}`}>QR Scan</button>
                                    </div>

                                    <div className="mb-6">
                                        <label className="text-sm font-bold text-gray-600 mb-2 block">Amount Receiving Now (₹)</label>
                                        <input type="number" className="border-2 border-blue-500 p-4 rounded-xl w-full text-2xl font-black text-center outline-none" value={modalPayAmount} onChange={(e) => setModalPayAmount(e.target.value)} />
                                    </div>

                                    {modalPayMethod === 'QR' && modalPayAmount > 0 && (
                                        <div className="bg-gray-50 p-4 rounded-xl flex flex-col items-center justify-center mb-6 border border-gray-200">
                                            <div className="w-32 h-32 bg-white flex items-center justify-center mb-2 rounded-lg overflow-hidden shadow-sm">
                                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(`upi://pay?pa=${upiID}&pn=${encodeURIComponent(shopName)}&am=${modalPayAmount}&cu=INR`)}`} alt="QR" crossOrigin="anonymous" className="w-full h-full object-cover" />
                                            </div>
                                            <p className="text-gray-800 text-xs font-bold text-center">Ask customer to scan</p>
                                        </div>
                                    )}

                                    <button onClick={handleConfirmPayment} disabled={isSubmitting} className={`w-full text-white text-lg font-bold py-4 rounded-xl shadow-lg transition-transform ${isSubmitting ? 'bg-gray-400' : 'bg-green-500 hover:bg-green-600'} active:scale-95`}>
                                        {isSubmitting ? 'Updating Database...' : 'Confirm & Save'}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            if (currentScreen === 'search') {
                return (
                    <div className="min-h-screen bg-gray-100 p-4 max-w-md mx-auto pb-20">
                        <div className="flex items-center gap-4 mb-6 mt-2">
                            <button onClick={() => navigateTo('dashboard')} className="w-10 h-10 bg-white rounded-full shadow flex items-center justify-center font-bold text-gray-600 active:scale-95">{"<"}</button>
                            <h1 className="text-xl font-bold text-gray-800">Search Records</h1>
                        </div>
                        
                        <div className="sticky top-4 z-10">
                            <input 
                                type="text" 
                                placeholder="Type Name, Bike, or Phone..." 
                                className="border border-gray-200 p-4 rounded-2xl w-full bg-white shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 mb-6 font-medium"
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                        </div>

                        {isLoadingBills ? (
                            <div className="text-center text-gray-500 mt-10 animate-pulse font-medium">Loading bills from database...</div>
                        ) : (
                            <div className="space-y-3">
                                {filteredBills.length === 0 && <div className="text-center text-gray-500 mt-10">No records found.</div>}
                                
                                {filteredBills.map((bill, idx) => (
                                    <div key={idx} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <h3 className="font-bold text-gray-800 text-lg">{bill.customerName || 'Unknown'}</h3>
                                                <p className="text-sm text-gray-500">{bill.vehicleModel} {bill.vehicleNo ? `- ${bill.vehicleNo}` : ''}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-xs text-gray-400 font-medium">
                                                    {bill.date ? new Date(bill.date).toLocaleDateString() : ''}
                                                </p>
                                                <p className="font-bold text-gray-800 mt-1">₹{bill.grandTotal}</p>
                                            </div>
                                        </div>
                                        
                                        <div className="mt-2 mb-3 pt-3 border-t border-gray-50 flex justify-between items-center">
                                            <span className="text-xs text-gray-500">{bill.phone}</span>
                                            {bill.balanceDue > 0 ? (
                                                <span className="bg-red-50 text-red-600 px-3 py-1 rounded-full text-xs font-bold border border-red-100">
                                                    Pending: ₹{bill.balanceDue}
                                                </span>
                                            ) : (
                                                <span className="bg-green-50 text-green-600 px-3 py-1 rounded-full text-xs font-bold border border-green-100">
                                                    Fully Paid
                                                </span>
                                            )}
                                        </div>

                                        <div className="flex gap-2 mt-2">
                                            <button onClick={() => handleViewBill(bill)} className="w-1/2 bg-gray-100 text-gray-700 font-bold py-2 rounded-lg text-sm active:scale-95 transition-transform">👁️ View</button>
                                            <button onClick={() => handleEditBill(bill)} className="w-1/2 bg-indigo-50 text-indigo-600 font-bold py-2 rounded-lg text-sm active:scale-95 transition-transform">✏️ Edit</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            }

            if (currentScreen === 'receipt') {
                return (
                    <div className="min-h-screen bg-gray-100 p-4 pb-20">
                        <div id="receipt-capture" className="bg-white rounded-xl shadow-2xl overflow-hidden border border-gray-100 max-w-sm mx-auto relative">
                            
                            {editingBillId && (
                                <div className="absolute top-2 right-2 bg-yellow-400 text-yellow-900 text-[10px] font-bold px-2 py-1 rounded-full">
                                    UPDATED BILL
                                </div>
                            )}

                            <div className="bg-gradient-to-r from-blue-600 to-indigo-700 p-6 text-center text-white">
                                <h1 className="text-2xl font-black tracking-wider uppercase">Mary Two Wheelar</h1>
                                <p className="text-sm font-medium tracking-widest uppercase opacity-90 mt-1 mb-3">Workshop</p>
                                <p className="text-xs opacity-80 mb-1">Srivilliputtur</p>
                                <p className="text-xs opacity-80">Ph: +91 9876543210</p> 
                                <div className="mt-4 p-2 bg-black/20 rounded text-sm italic font-serif">{dailyVerse}</div>
                            </div>
                            
                            <div className="p-5 border-b border-dashed border-gray-300 bg-gray-50 text-sm">
                                <p className="text-gray-500 mb-1">Name: <span className="text-gray-900 font-bold">{customerName || 'Unknown'}</span></p>
                                <p className="text-gray-500 mb-1">Vehicle: <span className="text-gray-900 font-bold">{vehicleModel || 'Unknown'} {vehicleNo ? `- ${vehicleNo}` : ''}</span></p>
                                <p className="text-gray-500">Date: <span className="text-gray-900 font-bold">{new Date(billDate).toLocaleDateString()}</span></p>
                            </div>
                            
                            <div className="p-5">
                                {items.map((item, index) => (
                                    <div key={index} className="flex justify-between text-sm text-gray-800 mb-2">
                                        <span>{item.name}</span><span className="font-medium">₹{item.price.toFixed(2)}</span>
                                    </div>
                                ))}
                                {cooli && (
                                    <div className="flex justify-between text-sm text-gray-800 mb-2 mt-4 pt-4 border-t border-gray-100">
                                        <span>Cooli (Labor)</span><span className="font-medium">₹{parseFloat(cooli).toFixed(2)}</span>
                                    </div>
                                )}
                            </div>
                            
                            <div className="bg-gray-800 p-5 text-white">
                                <div className="flex justify-between text-lg font-bold mb-2"><span>Grand Total</span><span>₹{grandTotal.toFixed(2)}</span></div>
                                <div className="flex justify-between text-sm text-gray-400 mb-2"><span>Advance / Paid</span><span className="text-green-400">₹{currentAdvance.toFixed(2)}</span></div>
                                {balanceDue > 0 && (
                                    <div className="flex justify-between text-xl font-black mt-3 pt-3 border-t border-gray-700 text-red-400">
                                        <span>Balance Due</span><span>₹{balanceDue.toFixed(2)}</span>
                                    </div>
                                )}
                            </div>
                            <div className="bg-white p-4 text-center"><p className="text-gray-500 font-medium text-sm">நன்றி! மீண்டும் வருக!</p></div>
                        </div>
                        <div className="mt-6 flex gap-3 max-w-sm mx-auto">
                            <button onClick={resetForm} className="w-1/2 bg-gray-200 text-gray-800 font-bold py-3 rounded-xl shadow active:scale-95 transition-transform">Home</button>
                            <button onClick={handleShare} className="w-1/2 bg-green-500 text-white font-bold py-3 rounded-xl shadow active:scale-95 transition-transform">Share Bill</button>
                        </div>
                    </div>
                );
            }

            // NEW BILL / EDIT BILL FORM
            return (
                <div className="p-4 max-w-md mx-auto pb-20">
                    <div className="flex items-center gap-4 mb-6 mt-2">
                        <button onClick={resetForm} className="w-10 h-10 bg-white rounded-full shadow flex items-center justify-center font-bold text-gray-600 active:scale-95">{"<"}</button>
                        <h1 className="text-xl font-bold text-gray-800">{editingBillId ? 'Edit Bill' : 'Create New Bill'}</h1>
                    </div>
                    
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 mb-6">
                        <h2 className="text-lg font-semibold mb-4 text-gray-700">Vehicle Details</h2>
                        <div className="flex flex-col gap-3 mb-4">
                            <input type="text" placeholder="Customer Name" className="border p-3 rounded-xl w-full bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500" value={customerName} onChange={(e) => setCustomerName(e.target.value)} />
                            <input type="tel" placeholder="Phone No." className="border p-3 rounded-xl w-full bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500" value={phone} onChange={(e) => setPhone(e.target.value)} />
                            <div className="flex gap-2">
                                <input type="text" placeholder="Model (e.g. SP125)" className="border p-3 rounded-xl w-1/2 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500" value={vehicleModel} onChange={(e) => setVehicleModel(e.target.value)} />
                                <input type="text" placeholder="Number" className="border p-3 rounded-xl w-1/2 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500" value={vehicleNo} onChange={(e) => setVehicleNo(e.target.value)} />
                            </div>
                        </div>
                    </div>

                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 mb-6">
                        <h2 className="text-lg font-semibold mb-4 text-gray-700">Add Spares & Service</h2>
                        <div className="flex gap-2 mb-4">
                            <input type="text" placeholder="Tap mic..." className="border p-3 rounded-xl w-2/3 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500" value={selectedItem} onChange={(e) => setSelectedItem(e.target.value)} />
                            <input type="number" placeholder="₹ Price" className="border p-3 rounded-xl w-1/3 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500" value={itemPrice} onChange={(e) => setItemPrice(e.target.value)} />
                        </div>
                        <button onClick={handleAddItem} className="w-full bg-gray-800 text-white font-semibold py-3 rounded-xl shadow-md active:scale-95 transition-transform">Add Item</button>
                        <div className="mt-4">
                            {items.map((item, index) => (
                                <div key={index} className="flex justify-between border-b border-gray-100 py-3 text-sm text-gray-700">
                                    <span className="font-medium">{item.name}</span>
                                    <div className="flex items-center gap-3">
                                        <span className="font-bold text-gray-900">₹{item.price}</span>
                                        <button onClick={() => setItems(items.filter((_, i) => i !== index))} className="text-red-500 font-bold">X</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 mb-6">
                        <h2 className="text-lg font-semibold mb-4 text-gray-700">Labor & Total</h2>
                        <div className="flex justify-between items-center mb-4">
                            <span className="font-medium text-gray-600">Cooli (Labor) ₹</span>
                            <input type="number" placeholder="0" className="border p-3 rounded-xl w-1/2 text-right bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500" value={cooli} onChange={(e) => setCooli(e.target.value)} />
                        </div>
                        <div className="flex justify-between items-center border-t border-gray-200 pt-4 mt-2 mb-4">
                            <span className="text-xl font-bold text-gray-800">Grand Total</span><span className="text-2xl font-black text-blue-600">₹{grandTotal}</span>
                        </div>
                        
                        <div className="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                            <span className="font-bold text-gray-600">Advance Paid ₹</span>
                            <input type="number" placeholder="0" className="border p-2 rounded-lg w-1/2 text-right bg-white outline-none focus:ring-2 focus:ring-blue-500" value={advancePaid} onChange={(e) => setAdvancePaid(e.target.value)} />
                        </div>
                        {balanceDue > 0 && (
                            <div className="flex justify-between items-center pt-3 mt-3 text-red-500 font-bold">
                                <span>Balance Pending</span><span>₹{balanceDue}</span>
                            </div>
                        )}
                    </div>

                    <button onClick={handleSubmitBill} disabled={isSubmitting} className={`w-full text-white text-lg font-bold py-4 rounded-xl shadow-lg transition-transform ${isSubmitting ? 'bg-gray-400' : (editingBillId ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-blue-600 hover:bg-blue-700')} active:scale-95`}>
                        {isSubmitting ? 'Saving to Database...' : (editingBillId ? 'Update & Save Bill' : 'Generate New Bill')}
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
