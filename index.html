<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mary Two Wheelar Workshop</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- 🌟 CONNECTS YOUR 365 BIBLE VERSES FROM THE VAULT 🌟 -->
    <script src="./bible.js"></script>

    <!-- Custom CSS for Scrollbars & Cinematic Animations -->
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        .glow-input:focus { box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); border-color: #6366f1; }
        .glow-button { box-shadow: 0 0 20px rgba(139, 92, 246, 0.5); }
        
        /* 🌟 CINEMATIC SPLASH SCREEN ANIMATIONS 🌟 */
        @keyframes fadeOutVerse {
            0% { opacity: 0; transform: scale(0.95); }
            15% { opacity: 1; transform: scale(1); }
            80% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); }
        }
        @keyframes fadeInBike {
            0% { opacity: 0; transform: scale(1.15); filter: blur(4px); }
            15% { opacity: 1; transform: scale(1); filter: blur(0px); }
            85% { opacity: 1; transform: scale(1); filter: blur(0px); }
            100% { opacity: 0; transform: scale(1.05); filter: blur(3px); }
        }
        .phase-1 {
            animation: fadeOutVerse 3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        .phase-2 {
            animation: fadeInBike 3.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 2.8s; /* Waits for the verse to finish */
            opacity: 0;
        }
    </style>
</head>
<body class="font-sans antialiased selection:bg-indigo-500 selection:text-white transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Connected to your exact Google Script URL
        const GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycbyOzAZoSlxeTHk0A2uEM8Ehsc8aKSgDeSd3eNvi1r7ylDkYHLVH144PdeHH1hkw0i0/exec"; 

        // 🌟 GLOBAL AUDIO MANAGER 🌟
        const playSound = (type) => {
            try {
                let url = '';
                if(type === 'click') url = 'https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'; 
                if(type === 'success') url = 'https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'; 
                if(type === 'bike') url = 'https://assets.mixkit.co/active_storage/sfx/1632/1632-preview.mp3'; 
                
                const audio = new Audio(url);
                audio.volume = type === 'click' ? 0.3 : 1.0; 
                audio.play().catch(e => console.log("Audio blocked by browser auto-play policy", e));
            } catch(e) {}
        };

        function App() {
            // === CONFIG ===
            const upiID = "weslyragland-1@okaxis"; // Connected to your UPI ID
            const shopName = "Mary Two Wheelar Workshop";
            
            // === STATE ===
            const [isDarkMode, setIsDarkMode] = useState(true); 
            const [currentScreen, setCurrentScreen] = useState('pre-splash');
            
            // Daily Verse State (Pulls from your bible.js vault)
            const fallbackVerse = { tamil: '"கர்த்தர் என் மேய்ப்பராயிருக்கிறார்; நான் தாழ்ச்சியடையேன்."', text: '"The Lord is my shepherd; I shall not want."', ref: "Psalm 23:1" };
            const [currentVerse, setCurrentVerse] = useState(() => {
                return typeof getCalculatedDailyVerseObject === 'function' ? getCalculatedDailyVerseObject() : fallbackVerse;
            });
            
            // Form States
            const [customerName, setCustomerName] = useState('');
            const [phone, setPhone] = useState('');
            const [vehicleModel, setVehicleModel] = useState('');
            const [vehicleNo, setVehicleNo] = useState('');
            const [items, setItems] = useState([]);
            const [selectedItem, setSelectedItem] = useState('');
            const [itemPrice, setItemPrice] = useState('');
            const [cooli, setCooli] = useState('');
            const [advancePaid, setAdvancePaid] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [editingBillId, setEditingBillId] = useState(null); 
            const [billDate, setBillDate] = useState(new Date().toISOString());

            const [allBills, setAllBills] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [isLoadingBills, setIsLoadingBills] = useState(true);

            const [payModalBill, setPayModalBill] = useState(null);
            const [modalPayAmount, setModalPayAmount] = useState('');
            const [modalPayMethod, setModalPayMethod] = useState('Cash');

            // === THEME CLASSES ===
            const theme = {
                bg: isDarkMode ? 'bg-[#0f172a]' : 'bg-slate-100',
                text: isDarkMode ? 'text-slate-100' : 'text-slate-900',
                textMuted: isDarkMode ? 'text-slate-400' : 'text-slate-500',
                glass: isDarkMode ? 'bg-slate-800/80 border-slate-700/50 backdrop-blur-xl' : 'bg-white border-slate-200 shadow-xl',
                input: isDarkMode ? 'bg-slate-900 border-slate-700 text-white' : 'bg-slate-50 border-slate-300 text-slate-900',
                card: isDarkMode ? 'bg-slate-800/90 border-slate-700/50' : 'bg-white border-slate-200 shadow-md',
                primaryGradient: 'bg-gradient-to-r from-violet-600 to-indigo-600'
            };

            // === FETCH DATA ON LOAD ===
            const fetchBills = async () => {
                setIsLoadingBills(true);
                try {
                    const response = await fetch(GOOGLE_SHEETS_URL);
                    const json = await response.json();
                    if (json.result === 'success') setAllBills(json.data.reverse()); 
                } catch (error) { console.error("Failed to load bills"); }
                setIsLoadingBills(false);
            };

            useEffect(() => {
                fetchBills();
                const handlePopState = (e) => {
                    if (e.state && e.state.screen) {
                        playSound('click');
                        setCurrentScreen(e.state.screen);
                    }
                };
                window.addEventListener('popstate', handlePopState);
                window.history.replaceState({ screen: 'pre-splash' }, '');
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            const navigateTo = (screenName) => {
                playSound('click');
                window.history.pushState({ screen: screenName }, '');
                setCurrentScreen(screenName);
            };

            const toggleTheme = () => {
                playSound('click');
                setIsDarkMode(!isDarkMode);
            };

            const loadRandomVerse = () => {
                if (typeof BIBLE_VERSES_VAULT !== 'undefined' && BIBLE_VERSES_VAULT.length > 0) {
                    const randomIndex = Math.floor(Math.random() * BIBLE_VERSES_VAULT.length);
                    setCurrentVerse(BIBLE_VERSES_VAULT[randomIndex]);
                }
            };

            // 🌟 EXTENDED CINEMATIC SPLASH ENGINE 🌟
            const startEngineAndApp = () => {
                playSound('click'); 
                loadRandomVerse();
                setCurrentScreen('splash');
                
                // Bike roars perfectly synced with Phase 2 (at 2.6 seconds)
                setTimeout(() => { playSound('bike'); }, 2600);
                
                // Dashboard loads smoothly after the epic 6.5 second sequence
                setTimeout(() => {
                    window.history.replaceState({ screen: 'dashboard' }, '');
                    setCurrentScreen('dashboard');
                }, 6500);
            };

            // === MATH & SUBMIT ===
            const handleAddItem = (e) => {
                e.preventDefault();
                if (selectedItem && itemPrice) {
                    playSound('click');
                    setItems([...items, { name: selectedItem, price: parseFloat(itemPrice) }]);
                    setSelectedItem(''); setItemPrice('');
                }
            };

            const removeItem = (index) => {
                playSound('click');
                setItems(items.filter((_, i) => i !== index));
            };

            const sparesTotal = items.reduce((sum, item) => sum + item.price, 0);
            const grandTotal = sparesTotal + (parseFloat(cooli) || 0);
            const currentAdvance = parseFloat(advancePaid) || 0; 
            const balanceDue = Math.max(0, grandTotal - currentAdvance);
            const paymentStatus = balanceDue > 0 ? 'Pending' : 'Paid';

            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(`upi://pay?pa=${upiID}&pn=${encodeURIComponent(shopName)}&am=${balanceDue}&cu=INR`)}`;

            const handleSubmitBill = async () => {
                const hasVehicleDetail = customerName.trim() || phone.trim() || vehicleModel.trim() || vehicleNo.trim();
                if(!hasVehicleDetail) return alert("Please enter at least one detail!");
                if(items.length === 0 && !cooli) return alert("Please add at least one spare part or labor charge!");
                
                playSound('click');
                setIsSubmitting(true);
                const itemsString = items.map(i => `${i.name} (₹${i.price})`).join(', ');
                
                const billData = {
                    action: editingBillId ? "update" : "create",
                    billId: editingBillId, customerName, phone, vehicleModel, vehicleNo, 
                    itemsString: itemsString, itemsArray: items, sparesTotal, cooli: parseFloat(cooli) || 0,
                    grandTotal, paymentMethod: "Advance", amountPaid: currentAdvance, 
                    balanceDue, status: paymentStatus
                };

                try {
                    const response = await fetch(GOOGLE_SHEETS_URL, { method: 'POST', body: JSON.stringify(billData) });
                    const result = await response.json();
                    if(result.result === "success") {
                        playSound('success'); 
                        fetchBills(); 
                        loadRandomVerse(); 
                        navigateTo('receipt');
                    } else alert("Error saving to Google Sheets.");
                } catch (error) { alert("Submission failed. Check internet connection."); }
                setIsSubmitting(false);
            };

            const resetForm = () => {
                playSound('click');
                setEditingBillId(null); setBillDate(new Date().toISOString());
                setCustomerName(''); setPhone(''); setVehicleModel(''); setVehicleNo(''); 
                setItems([]); setCooli(''); setAdvancePaid(''); 
                navigateTo('newBill');
            };

            const loadBillData = (bill) => {
                playSound('click');
                setEditingBillId(bill.billId); setBillDate(bill.date);
                setCustomerName(bill.customerName); setPhone(bill.phone);
                setVehicleModel(bill.vehicleModel); setVehicleNo(bill.vehicleNo);
                setCooli(bill.cooli); setAdvancePaid(bill.amountPaid);
                try { setItems(JSON.parse(bill.itemsJson)); } catch(e) { setItems([]); }
            };

            const openPayModal = (bill) => {
                playSound('click');
                setPayModalBill(bill);
                setModalPayAmount(bill.balanceDue);
                setModalPayMethod('Cash');
            };

            const closePayModal = () => {
                playSound('click');
                setPayModalBill(null);
            };

            const handleConfirmPayment = async () => {
                if(!modalPayAmount || modalPayAmount <= 0) return alert("Enter a valid amount!");
                playSound('click');
                setIsSubmitting(true);

                const payVal = parseFloat(modalPayAmount);
                const oldPaid = parseFloat(payModalBill.amountPaid) || 0;
                const newPaid = oldPaid + payVal;
                const newBalance = Math.max(0, parseFloat(payModalBill.grandTotal) - newPaid);
                const newStatus = newBalance > 0 ? 'Pending' : 'Paid';

                const billData = {
                    action: "update", billId: payModalBill.billId,
                    customerName: payModalBill.customerName, phone: payModalBill.phone, 
                    vehicleModel: payModalBill.vehicleModel, vehicleNo: payModalBill.vehicleNo, 
                    itemsString: payModalBill.itemsString, itemsArray: JSON.parse(payModalBill.itemsJson || "[]"), 
                    sparesTotal: payModalBill.sparesTotal, cooli: payModalBill.cooli,
                    grandTotal: payModalBill.grandTotal, paymentMethod: modalPayMethod, 
                    amountPaid: newPaid, balanceDue: newBalance, status: newStatus
                };

                try {
                    const response = await fetch(GOOGLE_SHEETS_URL, { method: 'POST', body: JSON.stringify(billData) });
                    const result = await response.json();
                    if(result.result === "success") {
                        playSound('success'); 
                        setPayModalBill(null); fetchBills();
                    } else alert("Error saving payment.");
                } catch (error) { alert("Payment failed to save."); }
                setIsSubmitting(false);
            };

            const handleShare = async () => {
                playSound('click');
                const receiptElement = document.getElementById('receipt-capture');
                if (!receiptElement) return;
                try {
                    const canvas = await html2canvas(receiptElement, { scale: 2, useCORS: true, allowTaint: true });
                    canvas.toBlob(async (blob) => {
                        const fileName = customerName ? `Workshop_Bill_${customerName}.png` : `Workshop_Bill.png`;
                        const file = new File([blob], fileName, { type: "image/png" });
                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            await navigator.share({ title: 'Workshop Bill', text: 'Thank you!', files: [file] });
                        } else {
                            const link = document.createElement('a'); link.download = fileName; link.href = canvas.toDataURL(); link.click();
                        }
                    });
                } catch (error) { alert("Oops, couldn't capture the bill."); }
            };

            const filteredBills = allBills.filter(bill => {
                if (!searchQuery) return true;
                const q = searchQuery.toLowerCase();
                return String(bill.customerName).toLowerCase().includes(q) || String(bill.phone).toLowerCase().includes(q) || String(bill.vehicleModel).toLowerCase().includes(q) || String(bill.vehicleNo).toLowerCase().includes(q); 
            });

            const pendingBills = allBills.filter(bill => parseFloat(bill.balanceDue) > 0);
            const totalPendingAmount = pendingBills.reduce((sum, bill) => sum + parseFloat(bill.balanceDue), 0);

            // ==========================================
            // REUSABLE UI COMPONENTS
            // ==========================================
            
            const HeaderWord = () => (
                <div className="w-full text-center pt-2 pb-1">
                    <span className="font-serif italic font-extrabold text-lg text-yellow-500 tracking-wide">தேவனுக்கே மகிமை</span>
                </div>
            );

            const BottomNav = () => (
                <div className={`fixed bottom-0 w-full max-w-md mx-auto inset-x-0 ${theme.glass} border-t flex justify-around p-3 z-40 pb-6 rounded-t-3xl`}>
                    <button onClick={() => navigateTo('dashboard')} className={`flex flex-col items-center gap-1 transition-all ${currentScreen === 'dashboard' ? 'text-indigo-500 scale-110 font-bold' : theme.textMuted}`}>
                        <svg className="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                        <span className="text-[11px]">Home</span>
                    </button>
                    <button onClick={() => navigateTo('search')} className={`flex flex-col items-center gap-1 transition-all ${currentScreen === 'search' ? 'text-indigo-500 scale-110 font-bold' : theme.textMuted}`}>
                        <svg className="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clipRule="evenodd"></path></svg>
                        <span className="text-[11px]">Search</span>
                    </button>
                    <button onClick={() => navigateTo('pending')} className={`flex flex-col items-center gap-1 transition-all ${currentScreen === 'pending' ? 'text-indigo-500 scale-110 font-bold' : theme.textMuted}`}>
                        <svg className="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M4 4a2 2 0 00-2 2v4a2 2 0 002 2V6h10a2 2 0 00-2-2H4zm2 6a2 2 0 012-2h8a2 2 0 012 2v4a2 2 0 01-2 2H8a2 2 0 01-2-2v-4zm6 4a2 2 0 100-4 2 2 0 000 4z" clipRule="evenodd"></path></svg>
                        <span className="text-[11px]">Dues</span>
                    </button>
                </div>
            );

            const Fab = () => (
                <button onClick={resetForm} className={`fixed bottom-24 right-4 w-16 h-16 ${theme.primaryGradient} rounded-full flex items-center justify-center text-white text-4xl glow-button active:scale-95 transition-all z-40 border border-white/20 shadow-xl`}>
                    +
                </button>
            );

            const BillListItem = ({ bill }) => {
                const initial = bill.customerName ? bill.customerName.charAt(0).toUpperCase() : 'M';
                return (
                    <div className={`${theme.card} p-4 mb-4 rounded-2xl flex flex-col gap-3 transition-transform cursor-pointer relative border-l-4 ${bill.balanceDue > 0 ? 'border-l-pink-500' : 'border-l-emerald-500'}`}>
                        <div className="flex items-center gap-4" onClick={() => { loadBillData(bill); loadRandomVerse(); navigateTo('receipt'); }}>
                            <div className={`w-14 h-14 rounded-full ${theme.primaryGradient} flex items-center justify-center text-white font-bold text-2xl shadow-lg shrink-0`}>
                                {initial}
                            </div>
                            <div className="flex-1 min-w-0">
                                <div className="flex justify-between items-baseline mb-1">
                                    <h3 className={`font-bold ${theme.text} text-xl truncate`}>{bill.customerName || 'Customer'}</h3>
                                    <span className="text-sm text-indigo-500 font-bold whitespace-nowrap ml-2">
                                        {bill.date ? new Date(bill.date).toLocaleDateString([], {month:'short', day:'numeric'}) : ''}
                                    </span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <p className={`text-base ${theme.textMuted} truncate pr-2`}>{bill.vehicleModel} {bill.vehicleNo ? `- ${bill.vehicleNo}` : ''}</p>
                                    <span className={`font-bold ${theme.text} text-lg`}>₹{bill.grandTotal}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div className={`flex justify-between items-center pt-3 mt-1 border-t ${isDarkMode ? 'border-slate-700' : 'border-slate-200'}`}>
                            {bill.balanceDue > 0 ? (
                                <span className="bg-pink-500/20 text-pink-500 px-3 py-1 rounded-lg text-xs font-bold border border-pink-500/20">Pending: ₹{bill.balanceDue}</span>
                            ) : (
                                <span className="bg-emerald-500/20 text-emerald-500 px-3 py-1 rounded-lg text-xs font-bold border border-emerald-500/20">Fully Paid</span>
                            )}
                            
                            <button 
                                onClick={(e) => { e.stopPropagation(); loadBillData(bill); navigateTo('newBill'); }} 
                                className={`flex items-center gap-1 text-indigo-500 ${isDarkMode ? 'bg-indigo-500/10 hover:bg-indigo-500/20' : 'bg-indigo-100 hover:bg-indigo-200'} px-4 py-1.5 rounded-xl text-sm font-bold border border-indigo-500/20 active:scale-95 transition-transform`}
                            >
                                ✏️ Edit
                            </button>
                        </div>
                    </div>
                );
            };

            // === MAIN RENDER AREA ===
            return (
                <div className={`${theme.bg} min-h-screen transition-colors duration-300 font-sans`}>
                    
                    {/* PRE-SPLASH: Interacting allows Audio to play! */}
                    {currentScreen === 'pre-splash' && (
                        <div className="min-h-screen flex flex-col items-center justify-center relative overflow-hidden bg-[#0f172a]">
                            <div className="text-center z-10 p-6 flex flex-col items-center">
                                <h1 className="text-4xl font-black tracking-widest uppercase font-serif bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-indigo-500 mb-2 drop-shadow-md">Mary</h1>
                                <h2 className="text-sm tracking-widest uppercase text-slate-400 font-bold mb-10">Workshop System</h2>
                                
                                <button onClick={startEngineAndApp} className="bg-gradient-to-r from-emerald-400 to-emerald-600 text-slate-900 font-black text-xl px-10 py-5 rounded-full glow-button hover:scale-105 active:scale-95 transition-all shadow-[0_0_40px_rgba(52,211,153,0.5)] border-2 border-emerald-300">
                                    START ENGINE 🏍️
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 🌟 EPIC 6.5s CINEMATIC SPLASH SCREEN 🌟 */}
                    {currentScreen === 'splash' && (
                        <div className="min-h-screen flex flex-col items-center justify-center relative overflow-hidden bg-[#0f172a]">
                            <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-30"></div>
                            
                            {/* PHASE 1: BIBLE VERSE */}
                            <div className="phase-1 absolute inset-0 flex flex-col items-center justify-center p-8 z-20">
                                <p className="text-2xl md:text-3xl font-bold text-white leading-relaxed mb-6 text-center drop-shadow-[0_0_15px_rgba(255,255,255,0.6)]">
                                    {currentVerse.tamil}
                                </p>
                                <p className="text-base md:text-lg italic font-serif text-cyan-300 text-center drop-shadow-[0_0_8px_rgba(34,211,238,0.8)]">
                                    {currentVerse.text} - {currentVerse.ref}
                                </p>
                            </div>

                            {/* PHASE 2: HD SUPERBIKE & LOGO */}
                            <div className="phase-2 absolute inset-0 flex flex-col items-center justify-center p-4 z-30 bg-[#0f172a]">
                                <div className="absolute top-16 text-center w-full">
                                    <h1 className="text-5xl font-black tracking-widest uppercase font-serif bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-indigo-500 drop-shadow-[0_0_15px_rgba(99,102,241,0.5)] mb-2">Mary</h1>
                                    <div className="h-px w-24 mx-auto bg-cyan-500/50 my-4"></div>
                                    <h2 className="text-sm tracking-[0.3em] uppercase text-slate-300 font-bold">Two Wheelar Workshop</h2>
                                </div>
                                
                                <img 
                                    src="https://purepng.com/public/uploads/large/purepng.com-motorcyclemotorcyclemotorbikebike-17015284852932oeei.png" 
                                    onError={(e) => { e.target.onerror = null; e.target.src="https://freepngimg.com/thumb/motorcycle/2-2-motorcycle-png-hd.png" }}
                                    className="w-[140%] max-w-lg object-contain drop-shadow-[0_30px_30px_rgba(34,211,238,0.4)] mt-24" 
                                    alt="Superbike" 
                                />
                            </div>
                        </div>
                    )}

                    {currentScreen === 'dashboard' && (
                        <div className="pb-28 max-w-md mx-auto relative">
                            <div className={`sticky top-0 z-30 ${theme.glass} border-b p-4 pt-2 rounded-b-3xl mb-6`}>
                                <HeaderWord />
                                <div className="flex justify-between items-center mt-2">
                                    <div>
                                        <h1 className="text-2xl font-black tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-violet-500 to-indigo-500">Mary Workshop</h1>
                                        <p className={`text-sm font-bold ${theme.textMuted} mt-1 flex items-center gap-2`}>
                                            <span className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span> Online
                                        </p>
                                    </div>
                                    <button onClick={toggleTheme} className={`w-10 h-10 rounded-full flex items-center justify-center ${theme.card} text-xl shadow-md`}>
                                        {isDarkMode ? '☀️' : '🌙'}
                                    </button>
                                </div>
                            </div>
                            <div className="px-4">
                                <h2 className={`text-sm font-bold ${theme.textMuted} uppercase tracking-wider mb-4 ml-2`}>Recent Bills</h2>
                                {isLoadingBills ? (
                                    <div className="text-center text-indigo-500 mt-10 animate-pulse font-bold text-lg">Syncing database...</div>
                                ) : (
                                    <div>{allBills.length === 0 ? <p className={`text-center mt-10 ${theme.textMuted} text-lg`}>No records found.</p> : allBills.map((bill, idx) => <BillListItem key={idx} bill={bill} />)}</div>
                                )}
                            </div>
                            <Fab />
                            <BottomNav />
                        </div>
                    )}

                    {currentScreen === 'search' && (
                        <div className="pb-28 max-w-md mx-auto">
                            <div className={`sticky top-0 z-30 ${theme.glass} border-b p-4 pt-2 rounded-b-3xl mb-6`}>
                                <HeaderWord />
                                <input 
                                    type="text" 
                                    placeholder="Search Name, Bike, or Phone..." 
                                    className={`w-full mt-3 ${theme.input} border rounded-2xl p-4 outline-none glow-input transition-all font-bold text-lg`}
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                            <div className="px-4">
                                {isLoadingBills ? <div className="text-center text-indigo-500 mt-10 animate-pulse text-lg font-bold">Syncing...</div> : (
                                    filteredBills.map((bill, idx) => <BillListItem key={idx} bill={bill} />)
                                )}
                            </div>
                            <Fab />
                            <BottomNav />
                        </div>
                    )}

                    {currentScreen === 'pending' && (
                        <div className="pb-28 max-w-md mx-auto relative">
                            <div className={`sticky top-0 z-30 ${theme.glass} border-b p-4 pt-2 rounded-b-3xl mb-6`}>
                                <HeaderWord />
                                <h1 className={`text-2xl font-black ${theme.text} mb-3 mt-2`}>Pending Dues</h1>
                                <div className="bg-gradient-to-r from-pink-600 to-rose-600 p-6 rounded-2xl shadow-lg">
                                    <p className="text-sm font-bold text-pink-200 mb-1 uppercase tracking-wider">Total Outstanding</p>
                                    <h2 className="text-4xl font-black text-white">₹{totalPendingAmount.toFixed(2)}</h2>
                                </div>
                            </div>
                            <div className="px-4">
                                {pendingBills.length === 0 ? (
                                    <p className="text-center text-emerald-500 font-bold text-xl mt-10">No pending dues! Excellent.</p>
                                ) : (
                                    pendingBills.map((bill, idx) => (
                                        <div key={idx} className={`${theme.card} p-5 mb-4 rounded-2xl flex flex-col gap-3 border-l-4 border-l-pink-500`}>
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <h3 className={`font-bold ${theme.text} text-xl`}>{bill.customerName}</h3>
                                                    <p className={`text-base ${theme.textMuted} font-medium`}>{bill.vehicleModel}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="font-black text-pink-500 text-2xl">₹{bill.balanceDue}</p>
                                                    <p className={`text-sm ${theme.textMuted} font-bold`}>Total: ₹{bill.grandTotal}</p>
                                                </div>
                                            </div>
                                            <div className={`flex justify-between gap-3 mt-2 pt-3 border-t ${isDarkMode ? 'border-slate-700' : 'border-slate-200'}`}>
                                                <button onClick={() => { loadBillData(bill); navigateTo('newBill'); }} className={`w-1/3 text-indigo-500 font-bold text-sm py-3 rounded-xl border border-indigo-500/30 active:scale-95 transition-transform`}>
                                                    ✏️ Edit
                                                </button>
                                                <button onClick={() => openPayModal(bill)} className={`flex-1 ${isDarkMode ? 'bg-slate-900 text-indigo-400' : 'bg-indigo-50 text-indigo-700'} font-bold text-lg py-3 rounded-xl border border-indigo-500/30 active:scale-95 transition-transform`}>
                                                    Collect
                                                </button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>

                            {payModalBill && (
                                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                    <div className={`${theme.glass} border border-indigo-500/30 rounded-3xl p-6 w-full max-w-sm shadow-2xl relative`}>
                                        <button onClick={closePayModal} className={`absolute top-4 right-4 w-10 h-10 ${theme.input} rounded-full font-bold text-xl`}>X</button>
                                        <h2 className={`text-2xl font-black ${theme.text} mb-2`}>Receive Payment</h2>
                                        <p className={`text-base ${theme.textMuted} mb-6 font-bold`}>{payModalBill.customerName} - {payModalBill.vehicleModel}</p>
                                        
                                        <div className={`flex gap-2 mb-6 p-2 ${theme.input} rounded-2xl`}>
                                            <button onClick={() => {playSound('click'); setModalPayMethod('Cash')}} className={`w-1/2 py-3 text-lg rounded-xl font-bold transition-colors ${modalPayMethod === 'Cash' ? theme.primaryGradient + ' text-white shadow-md' : theme.textMuted}`}>Cash</button>
                                            <button onClick={() => {playSound('click'); setModalPayMethod('QR')}} className={`w-1/2 py-3 text-lg rounded-xl font-bold transition-colors ${modalPayMethod === 'QR' ? theme.primaryGradient + ' text-white shadow-md' : theme.textMuted}`}>QR Scan</button>
                                        </div>

                                        <div className="mb-6">
                                            <label className={`text-sm font-bold text-indigo-500 uppercase tracking-wider mb-2 block`}>Amount Receiving (₹)</label>
                                            <input type="number" className={`w-full ${theme.input} border-2 border-indigo-500 p-5 rounded-2xl text-3xl font-black text-center outline-none glow-input`} value={modalPayAmount} onChange={(e) => setModalPayAmount(e.target.value)} />
                                        </div>

                                        {modalPayMethod === 'QR' && modalPayAmount > 0 && (
                                            <div className="bg-white p-4 rounded-2xl flex flex-col items-center justify-center mb-6">
                                                <div className="w-40 h-40 flex items-center justify-center mb-3">
                                                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(`upi://pay?pa=${upiID}&pn=${encodeURIComponent(shopName)}&am=${modalPayAmount}&cu=INR`)}`} alt="QR" crossOrigin="anonymous" className="w-full h-full" />
                                                </div>
                                                <p className="text-slate-800 text-sm font-bold">Ask customer to scan</p>
                                            </div>
                                        )}

                                        <button onClick={handleConfirmPayment} disabled={isSubmitting} className={`w-full text-white text-xl font-bold py-5 rounded-2xl glow-button transition-transform ${isSubmitting ? 'bg-slate-600' : theme.primaryGradient} active:scale-95`}>
                                            {isSubmitting ? 'Updating...' : 'Confirm Payment'}
                                        </button>
                                    </div>
                                </div>
                            )}
                            <BottomNav />
                        </div>
                    )}

                    {currentScreen === 'newBill' && (
                        <div className="pb-24 max-w-md mx-auto p-4">
                            <div className="flex items-center gap-4 mb-6 mt-2">
                                <button onClick={() => navigateTo('dashboard')} className={`w-12 h-12 ${theme.card} rounded-full flex items-center justify-center font-bold text-indigo-500 text-xl shadow-md active:scale-95`}>{"<"}</button>
                                <h1 className={`text-2xl font-black ${theme.text}`}>{editingBillId ? 'Edit Bill' : 'New Bill'}</h1>
                            </div>
                            
                            <div className={`${theme.card} p-6 rounded-3xl mb-6`}>
                                <h2 className="text-sm font-bold text-indigo-500 uppercase tracking-wider mb-5">Customer Info</h2>
                                <div className="flex flex-col gap-4">
                                    <input type="text" placeholder="Customer Name (Required)" className={`w-full ${theme.input} rounded-xl p-4 text-lg font-bold outline-none glow-input border-l-4 border-l-indigo-500`} value={customerName} onChange={(e) => setCustomerName(e.target.value)} />
                                    <input type="tel" placeholder="Phone No." className={`w-full ${theme.input} rounded-xl p-4 text-lg font-bold outline-none glow-input`} value={phone} onChange={(e) => setPhone(e.target.value)} />
                                    <div className="flex gap-3">
                                        <input type="text" placeholder="Bike Model" className={`w-1/2 ${theme.input} rounded-xl p-4 text-lg font-bold outline-none glow-input border-l-4 border-l-indigo-500`} value={vehicleModel} onChange={(e) => setVehicleModel(e.target.value)} />
                                        <input type="text" placeholder="Number" className={`w-1/2 ${theme.input} rounded-xl p-4 text-lg font-bold outline-none glow-input`} value={vehicleNo} onChange={(e) => setVehicleNo(e.target.value)} />
                                    </div>
                                </div>
                            </div>

                            <div className={`${theme.card} p-6 rounded-3xl mb-6`}>
                                <h2 className="text-sm font-bold text-indigo-500 uppercase tracking-wider mb-5">Spares & Services</h2>
                                <div className="flex gap-2 mb-5">
                                    <input type="text" placeholder="Item name..." className={`w-2/3 ${theme.input} rounded-xl p-4 text-lg font-bold outline-none glow-input`} value={selectedItem} onChange={(e) => setSelectedItem(e.target.value)} />
                                    <input type="number" placeholder="₹ Price" className={`w-1/3 ${theme.input} rounded-xl p-4 text-lg font-bold outline-none glow-input`} value={itemPrice} onChange={(e) => setItemPrice(e.target.value)} />
                                </div>
                                <button onClick={handleAddItem} className={`w-full ${isDarkMode ? 'bg-slate-900 text-indigo-400' : 'bg-indigo-50 text-indigo-700'} font-black text-lg py-4 rounded-xl border border-indigo-500/30 active:scale-95 transition-transform`}>Add to Bill</button>
                                
                                <div className="mt-5">
                                    {items.map((item, index) => (
                                        <div key={index} className={`flex justify-between border-b ${isDarkMode ? 'border-slate-700' : 'border-slate-200'} py-4 text-base ${theme.textMuted} font-bold`}>
                                            <span>{item.name}</span>
                                            <div className="flex items-center gap-4">
                                                <span className={`${theme.text} text-lg`}>₹{item.price}</span>
                                                <button onClick={() => removeItem(index)} className="text-pink-500 text-2xl px-2">×</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className={`${theme.card} p-6 rounded-3xl mb-6`}>
                                <h2 className="text-sm font-bold text-indigo-500 uppercase tracking-wider mb-5">Totals & Payment</h2>
                                <div className={`flex justify-between items-center mb-5 border-b ${isDarkMode ? 'border-slate-700' : 'border-slate-200'} pb-5`}>
                                    <span className={`${theme.textMuted} font-bold text-lg`}>Labor (Cooli) ₹</span>
                                    <input type="number" placeholder="0" className={`w-1/2 ${theme.input} rounded-xl p-4 text-xl font-black text-right outline-none glow-input`} value={cooli} onChange={(e) => setCooli(e.target.value)} />
                                </div>
                                
                                <div className="flex justify-between items-center mb-5">
                                    <span className={`text-xl font-black ${theme.text}`}>Grand Total</span>
                                    <span className="text-3xl font-black text-indigo-500">₹{grandTotal}</span>
                                </div>
                                
                                <div className={`flex justify-between items-center ${theme.input} p-4 rounded-2xl`}>
                                    <span className={`font-bold ${theme.textMuted} text-lg`}>Advance ₹</span>
                                    <input type="number" placeholder="0" className="w-1/2 bg-transparent text-emerald-500 text-2xl text-right outline-none font-black" value={advancePaid} onChange={(e) => setAdvancePaid(e.target.value)} />
                                </div>
                                {balanceDue > 0 && (
                                    <div className="flex justify-between items-center mt-4 pt-4 text-pink-500 font-black text-xl border-t border-pink-500/20">
                                        <span>Balance Due</span><span>₹{balanceDue}</span>
                                    </div>
                                )}
                            </div>

                            <button onClick={handleSubmitBill} disabled={isSubmitting} className={`w-full text-white text-xl font-black py-5 rounded-2xl glow-button transition-transform ${isSubmitting ? 'bg-slate-600' : theme.primaryGradient} active:scale-95 shadow-xl`}>
                                {isSubmitting ? 'Saving...' : (editingBillId ? 'Update Bill' : 'Generate Bill')}
                            </button>
                        </div>
                    )}

                    {currentScreen === 'receipt' && (
                        <div className="p-4 pb-24 max-w-md mx-auto">
                            <div className="flex items-center gap-4 mb-6 mt-2">
                                <button onClick={() => navigateTo('dashboard')} className={`w-12 h-12 ${theme.card} rounded-full flex items-center justify-center font-bold text-indigo-500 text-xl shadow-md active:scale-95`}>{"<"}</button>
                                <h1 className={`text-2xl font-black ${theme.text}`}>Digital Receipt</h1>
                            </div>

                            <div id="receipt-capture" className="bg-white rounded-3xl overflow-hidden shadow-2xl relative text-slate-900 border border-slate-200">
                                {editingBillId && (
                                    <div className="absolute top-3 right-3 bg-yellow-400 text-yellow-900 text-xs font-black px-3 py-1 rounded-full z-10 shadow-sm">UPDATED</div>
                                )}
                                
                                <div className="bg-white text-center pt-3 pb-2">
                                    <span className="font-serif italic font-extrabold text-xl text-yellow-600">தேவனுக்கே மகிமை</span>
                                </div>

                                <div className="bg-gradient-to-r from-violet-600 to-indigo-700 p-6 text-center text-white rounded-t-3xl shadow-inner">
                                    <h1 className="text-3xl font-black tracking-wider uppercase mb-1">Mary</h1>
                                    <p className="text-lg font-bold tracking-widest uppercase opacity-90 mb-3">Two Wheelar Workshop</p>
                                    <p className="text-sm opacity-90 font-medium">Srivilliputtur</p>
                                    <p className="text-sm font-bold opacity-90">Ph: +91 9876543210</p> 
                                    
                                    {/* 🌟 RANDOM VAULT BIBLE VERSE 🌟 */}
                                    <div className="mt-5 p-4 bg-black/20 rounded-2xl shadow-sm border border-white/10">
                                        <p className="text-base font-bold mb-2 leading-relaxed">{currentVerse.tamil}</p>
                                        <p className="text-xs italic font-serif opacity-80">{currentVerse.text} - {currentVerse.ref}</p>
                                    </div>
                                </div>

                                <div className="p-6 border-b-2 border-dashed border-slate-200 bg-slate-50 text-base">
                                    <p className="text-slate-500 mb-2 font-medium">Name: <span className="text-slate-900 font-bold ml-2 text-lg">{customerName || 'Unknown'}</span></p>
                                    <p className="text-slate-500 mb-2 font-medium">Vehicle: <span className="text-slate-900 font-bold ml-2 text-lg">{vehicleModel || 'Unknown'} {vehicleNo ? `- ${vehicleNo}` : ''}</span></p>
                                    <p className="text-slate-500 font-medium">Date: <span className="text-slate-900 font-bold ml-2 text-lg">{new Date(billDate).toLocaleDateString()}</span></p>
                                </div>

                                <div className="p-6">
                                    {items.map((item, index) => (
                                        <div key={index} className="flex justify-between text-base text-slate-800 mb-3 font-bold">
                                            <span>{item.name}</span><span className="text-lg">₹{item.price.toFixed(2)}</span>
                                        </div>
                                    ))}
                                    {cooli && (
                                        <div className="flex justify-between text-base text-slate-800 mb-3 mt-5 pt-5 border-t-2 border-slate-100 font-bold">
                                            <span>Cooli (Labor)</span><span className="text-lg">₹{parseFloat(cooli).toFixed(2)}</span>
                                        </div>
                                    )}
                                </div>

                                <div className="bg-slate-900 p-6 text-white">
                                    <div className="flex justify-between text-xl font-black mb-3"><span>Grand Total</span><span>₹{grandTotal.toFixed(2)}</span></div>
                                    <div className="flex justify-between text-base font-bold text-slate-400 mb-2"><span>Advance / Paid</span><span className="text-emerald-400">₹{currentAdvance.toFixed(2)}</span></div>
                                    
                                    {balanceDue > 0 && (
                                        <div className="flex justify-between text-2xl font-black mt-4 pt-4 border-t border-slate-700 text-pink-500">
                                            <span>Balance Due</span><span>₹{balanceDue.toFixed(2)}</span>
                                        </div>
                                    )}
                                    
                                    {balanceDue > 0 && (
                                        <div className="bg-white mt-6 p-4 rounded-2xl flex flex-col items-center justify-center text-center shadow-inner">
                                            <div className="w-36 h-36 bg-white flex items-center justify-center mb-3">
                                                <img src={qrUrl} alt="Scan to Pay" crossOrigin="anonymous" className="w-full h-full object-cover" />
                                            </div>
                                            <p className="text-slate-800 text-sm font-black">Scan to pay balance: ₹{balanceDue}</p>
                                        </div>
                                    )}
                                </div>
                                <div className="bg-slate-50 p-5 text-center"><p className="text-slate-600 font-bold text-base">நன்றி! மீண்டும் வருக!</p></div>
                            </div>

                            <div className="mt-8 flex gap-3">
                                <button onClick={() => navigateTo('dashboard')} className={`w-1/4 ${theme.card} ${theme.text} font-bold text-sm py-4 rounded-2xl active:scale-95 transition-transform shadow-lg`}>Home</button>
                                <button onClick={() => { playSound('click'); navigateTo('newBill'); }} className={`w-1/4 ${isDarkMode ? 'bg-indigo-500/20 text-indigo-400 border border-indigo-500/30' : 'bg-indigo-100 text-indigo-600 border border-indigo-300'} font-bold text-sm py-4 rounded-2xl active:scale-95 transition-transform shadow-lg`}>✏️ Edit</button>
                                <button onClick={handleShare} className="flex-1 bg-gradient-to-r from-emerald-400 to-emerald-500 text-slate-900 font-black text-lg py-4 rounded-2xl glow-button active:scale-95 transition-transform shadow-xl">
                                    Share Bill
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
