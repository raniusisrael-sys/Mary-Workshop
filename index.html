<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mary Two Wheelar Workshop</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- 🌟 CONNECTS YOUR 365 BIBLE VERSES FROM THE VAULT 🌟 -->
    <script src="./bible.js"></script>

    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .glow-input:focus { box-shadow: 0 0 10px rgba(99, 102, 241, 0.3); border-color: #6366f1; }
        
        @keyframes fadeOutVerse { 0%, 80% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.02); } }
        @keyframes fadeInOut { 0% { opacity: 0; filter: blur(4px); } 15%, 85% { opacity: 1; filter: blur(0px); } 100% { opacity: 0; filter: blur(3px); } }
        @keyframes driveBike { 0% { transform: translateX(-150vw) scale(0.8) rotate(-10deg); opacity: 0; } 20%, 80% { transform: translateX(-5vw) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translateX(150vw) scale(0.8) rotate(10deg); opacity: 0; } }
        @keyframes roadMove { 0% { background-position: 0 0; } 100% { background-position: -200px 0; } }
        
        .phase-1 { animation: fadeOutVerse 3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .phase-2-text { animation: fadeInOut 3.5s forwards; animation-delay: 2.8s; opacity: 0; }
        .phase-2-bike { animation: driveBike 3.5s forwards; animation-delay: 2.8s; opacity: 0; position: absolute; bottom: 25%; width: 280px; z-index: 50; filter: drop-shadow(0px 10px 10px rgba(34,211,238,0.4)); }
        .phase-2-road { animation: fadeInOut 3.5s forwards, roadMove 0.3s linear infinite; animation-delay: 2.8s, 0s; opacity: 0; background-image: linear-gradient(90deg, #64748b 50%, transparent 50%); background-size: 60px 100%; position: absolute; bottom: 24%; width: 100%; height: 4px; z-index: 40; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        .gear-1 { animation: spin 2.5s linear infinite; }
        .gear-2 { animation: spin-reverse 2.5s linear infinite; }
    </style>
</head>
<body class="font-sans antialiased selection:bg-indigo-500 selection:text-white transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycbyOzAZoSlxeTHk0A2uEM8Ehsc8aKSgDeSd3eNvi1r7ylDkYHLVH144PdeHH1hkw0i0/exec"; 

        // 🌟 SILENT AUDIO MANAGER 🌟
        const audioClick = new Audio('https://actions.google.com/sounds/v1/cartoon/pop.ogg');
        const audioSuccess = new Audio('https://actions.google.com/sounds/v1/cartoon/magic_chime.ogg');

        const playSound = (type) => {
            try {
                if (type === 'click') {
                    audioClick.currentTime = 0; audioClick.volume = 0.3; audioClick.play().catch(e => console.log(e));
                } else if (type === 'success') {
                    audioSuccess.currentTime = 0; audioSuccess.volume = 1.0; audioSuccess.play().catch(e => console.log(e));
                }
            } catch(e) {}
        };

        function App() {
            const upiID = "weslyragland-1@okaxis"; 
            const shopName = "Mary Two Wheelar Workshop";
            const googleReviewLink = "https://share.google/JIPz4fhs2eKsi5Nel";
            
            const [isDarkMode, setIsDarkMode] = useState(true); 
            const [currentScreen, setCurrentScreen] = useState('pre-splash');
            
            const fallbackVerse = { tamil: '"கர்த்தர் என் மேய்ப்பராயிருக்கிறார்; நான் தாழ்ச்சியடையேன்."', text: '"The Lord is my shepherd; I shall not want."', ref: "Psalm 23:1" };
            const [currentVerse, setCurrentVerse] = useState(() => {
                return typeof getCalculatedDailyVerseObject === 'function' ? getCalculatedDailyVerseObject() : fallbackVerse;
            });
            
            const [customerName, setCustomerName] = useState('');
            const [phone, setPhone] = useState('');
            const [vehicleModel, setVehicleModel] = useState('');
            const [vehicleNo, setVehicleNo] = useState('');
            const [items, setItems] = useState([]);
            const [selectedItem, setSelectedItem] = useState('');
            const [itemPrice, setItemPrice] = useState('');
            const [cooli, setCooli] = useState('');
            const [advancePaid, setAdvancePaid] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [editingBillId, setEditingBillId] = useState(null); 
            const [billDate, setBillDate] = useState(new Date().toISOString());

            const [allBills, setAllBills] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [isLoadingBills, setIsLoadingBills] = useState(true);
            const [isSyncing, setIsSyncing] = useState(false); 

            // 🌟 DYNAMIC RECENT ITEMS STATE 🌟
            const [recentItems, setRecentItems] = useState(() => {
                const saved = localStorage.getItem('mary_recent_items');
                if (saved) return JSON.parse(saved);
                return ["Water Wash", "Oil Change", "General Service", "Chain Lube", "Brake Tight"];
            });

            const [payModalBill, setPayModalBill] = useState(null);
            const [modalPayAmount, setModalPayAmount] = useState('');
            const [modalPayMethod, setModalPayMethod] = useState('Cash');
            
            const [generatedBillImage, setGeneratedBillImage] = useState(null);
            const [isCopied, setIsCopied] = useState(false);

            const theme = {
                bg: isDarkMode ? 'bg-[#0f172a]' : 'bg-slate-50',
                text: isDarkMode ? 'text-slate-100' : 'text-slate-900',
                textMuted: isDarkMode ? 'text-slate-400' : 'text-slate-500',
                glass: isDarkMode ? 'bg-slate-800/90 border-slate-700/50 backdrop-blur-md' : 'bg-white border-slate-200 shadow-sm',
                input: isDarkMode ? 'bg-slate-900 border-slate-700 text-white' : 'bg-slate-100 border-slate-300 text-slate-900',
                card: isDarkMode ? 'bg-slate-800/90 border-slate-700/50' : 'bg-white border-slate-200 shadow-sm',
                primaryGradient: 'bg-gradient-to-r from-violet-600 to-indigo-600'
            };

            const fetchBills = async () => {
                const cachedBills = localStorage.getItem('mary_bills_cache');
                if (cachedBills) {
                    setAllBills(JSON.parse(cachedBills));
                    setIsLoadingBills(false); 
                } else setIsLoadingBills(true);

                setIsSyncing(true);
                try {
                    const response = await fetch(GOOGLE_SHEETS_URL);
                    const json = await response.json();
                    if (json.result === 'success') {
                        const activeBills = json.data.reverse().filter(b => b.status !== 'Deleted');
                        setAllBills(activeBills); 
                        localStorage.setItem('mary_bills_cache', JSON.stringify(activeBills)); 
                    }
                } catch (error) {}
                setIsLoadingBills(false); setIsSyncing(false);
            };

            useEffect(() => {
                fetchBills();
                const handlePopState = (e) => { if (e.state && e.state.screen) setCurrentScreen(e.state.screen); };
                window.addEventListener('popstate', handlePopState);
                window.history.replaceState({ screen: 'pre-splash' }, '');
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            const navigateTo = (screenName) => {
                window.history.pushState({ screen: screenName }, '');
                setCurrentScreen(screenName);
            };

            const toggleTheme = () => setIsDarkMode(!isDarkMode);

            const loadRandomVerse = () => {
                if (typeof BIBLE_VERSES_VAULT !== 'undefined' && BIBLE_VERSES_VAULT.length > 0) {
                    const randomIndex = Math.floor(Math.random() * BIBLE_VERSES_VAULT.length);
                    setCurrentVerse(BIBLE_VERSES_VAULT[randomIndex]);
                }
            };

            const startEngineAndApp = () => {
                playSound('click');
                loadRandomVerse();
                setCurrentScreen('splash');
                setTimeout(() => {
                    window.history.replaceState({ screen: 'dashboard' }, '');
                    setCurrentScreen('dashboard');
                }, 6500);
            };

            // 🌟 DYNAMICALLY SAVES NEW ITEMS TO TOP 10 🌟
            const handleAddItem = (e) => {
                e.preventDefault();
                if (selectedItem && itemPrice) {
                    playSound('click');
                    setItems([...items, { name: selectedItem, price: parseFloat(itemPrice) }]);
                    
                    const updatedRecents = [selectedItem, ...recentItems.filter(i => i.toLowerCase() !== selectedItem.toLowerCase())].slice(0, 10);
                    setRecentItems(updatedRecents);
                    localStorage.setItem('mary_recent_items', JSON.stringify(updatedRecents));
                    
                    setSelectedItem(''); setItemPrice('');
                }
            };
            
            const handleAddQuickItem = (itemName, e) => {
                e.preventDefault();
                playSound('click');
                setSelectedItem(itemName);
            };

            const removeItem = (index) => {
                playSound('click');
                setItems(items.filter((_, i) => i !== index));
            };

            const sparesTotal = items.reduce((sum, item) => sum + item.price, 0);
            const grandTotal = sparesTotal + (parseFloat(cooli) || 0);
            const currentAdvance = parseFloat(advancePaid) || 0; 
            const balanceDue = Math.max(0, grandTotal - currentAdvance);
            const paymentStatus = balanceDue > 0 ? 'Pending' : 'Paid';

            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(`upi://pay?pa=${upiID}&pn=${encodeURIComponent(shopName)}&am=${balanceDue}&cu=INR`)}`;

            const handleSubmitBill = async () => {
                const hasVehicleDetail = customerName.trim() || phone.trim() || vehicleModel.trim() || vehicleNo.trim();
                if(!hasVehicleDetail) return alert("Please enter at least one detail!");
                if(items.length === 0 && !cooli) return alert("Please add at least one part or labor charge!");
                
                playSound('click');
                setIsSubmitting(true); 
                const itemsString = items.map(i => `${i.name} (₹${i.price})`).join(', ');
                
                const billData = {
                    action: editingBillId ? "update" : "create",
                    billId: editingBillId, customerName, phone, vehicleModel, vehicleNo, 
                    itemsString: itemsString, itemsArray: items, sparesTotal, cooli: parseFloat(cooli) || 0,
                    grandTotal, paymentMethod: "Advance", amountPaid: currentAdvance, 
                    balanceDue, status: paymentStatus
                };

                try {
                    const response = await fetch(GOOGLE_SHEETS_URL, { method: 'POST', body: JSON.stringify(billData) });
                    const result = await response.json();
                    if(result.result === "success") {
                        playSound('success');
                        try {
                            const freshResponse = await fetch(GOOGLE_SHEETS_URL);
                            const freshJson = await freshResponse.json();
                            if (freshJson.result === 'success') {
                                const activeBills = freshJson.data.reverse().filter(b => b.status !== 'Deleted');
                                setAllBills(activeBills);
                                localStorage.setItem('mary_bills_cache', JSON.stringify(activeBills)); 
                                if (!editingBillId) {
                                    const newlyCreated = activeBills.find(b => b.customerName === customerName && b.grandTotal == grandTotal);
                                    if(newlyCreated) setEditingBillId(newlyCreated.billId);
                                }
                            }
                        } catch(e) {}
                        loadRandomVerse(); 
                        navigateTo('receipt');
                    } else alert("Error saving to Google Sheets.");
                } catch (error) { alert("Submission failed. Check internet connection."); }
                setIsSubmitting(false);
            };

            const resetForm = () => {
                playSound('click');
                setEditingBillId(null); setBillDate(new Date().toISOString());
                setCustomerName(''); setPhone(''); setVehicleModel(''); setVehicleNo(''); 
                setItems([]); setCooli(''); setAdvancePaid(''); 
                navigateTo('newBill');
            };

            const loadBillData = (bill) => {
                playSound('click');
                setEditingBillId(bill.billId); setBillDate(bill.date);
                setCustomerName(bill.customerName); setPhone(bill.phone);
                setVehicleModel(bill.vehicleModel); setVehicleNo(bill.vehicleNo);
                setCooli(bill.cooli); setAdvancePaid(bill.amountPaid);
                try { setItems(JSON.parse(bill.itemsJson)); } catch(e) { setItems([]); }
            };

            // 🌟 TRUE DELETE ACTION COMMAND 🌟
            const handleDeleteBill = async (billToDelete, e) => {
                e.stopPropagation();
                if(!window.confirm(`Delete bill for ${billToDelete.customerName} permanently?`)) return;
                
                playSound('click');
                setIsSubmitting(true); 
                const updatedList = allBills.filter(b => b.billId !== billToDelete.billId);
                setAllBills(updatedList);
                localStorage.setItem('mary_bills_cache', JSON.stringify(updatedList));
                
                const deleteData = { action: "delete", billId: billToDelete.billId };
                try { await fetch(GOOGLE_SHEETS_URL, { method: 'POST', body: JSON.stringify(deleteData) }); } catch (error) {}
                setIsSubmitting(false);
            };

            const openPayModal = (bill) => { playSound('click'); setPayModalBill(bill); setModalPayAmount(bill.balanceDue); setModalPayMethod('Cash'); };
            const closePayModal = () => { playSound('click'); setPayModalBill(null); };

            const handleConfirmPayment = async () => {
                if(!modalPayAmount || modalPayAmount <= 0) return alert("Enter a valid amount!");
                playSound('click');
                setIsSubmitting(true);

                const payVal = parseFloat(modalPayAmount);
                const oldPaid = parseFloat(payModalBill.amountPaid) || 0;
                const newPaid = oldPaid + payVal;
                const newBalance = Math.max(0, parseFloat(payModalBill.grandTotal) - newPaid);
                const newStatus = newBalance > 0 ? 'Pending' : 'Paid';

                const billData = { ...payModalBill, action: "update", itemsArray: JSON.parse(payModalBill.itemsJson || "[]"), paymentMethod: modalPayMethod, amountPaid: newPaid, balanceDue: newBalance, status: newStatus };

                try {
                    const response = await fetch(GOOGLE_SHEETS_URL, { method: 'POST', body: JSON.stringify(billData) });
                    const result = await response.json();
                    if(result.result === "success") { playSound('success'); setPayModalBill(null); fetchBills(); }
                } catch (error) {}
                setIsSubmitting(false);
            };

            const handleShare = async () => {
                playSound('click');
                const receiptElement = document.getElementById('receipt-capture');
                if (!receiptElement) return;
                try {
                    const canvas = await html2canvas(receiptElement, { scale: 2, useCORS: true, allowTaint: true, backgroundColor: "#ffffff" });
                    canvas.toBlob(async (blob) => {
                        const fileName = customerName ? `Mary_Workshop_${customerName}.png` : `Workshop_Bill.png`;
                        const file = new File([blob], fileName, { type: "image/png" });
                        const shareMessage = `மேரி டூவீலர் ஒர்க்ஸ் (Mary Two Wheelar Workshop)\n\nநன்றி! மீண்டும் வருக!\n\nஎங்கள் சேவைகளை Google-ல் மதிப்பிடவும் ⭐⭐⭐⭐⭐:\n${googleReviewLink}`;

                        try {
                            if (navigator.share) {
                                await navigator.share({ title: 'Mary Workshop Bill', text: shareMessage, files: [file] });
                            } else {
                                throw new Error("Share API not supported");
                            }
                        } catch (error) {
                            setGeneratedBillImage({ url: URL.createObjectURL(blob), text: shareMessage, phone: phone });
                        }
                    });
                } catch (error) { alert("Couldn't process the bill sharing."); }
            };

            const filteredBills = allBills.filter(bill => {
                if (!searchQuery) return true;
                const q = searchQuery.toLowerCase();
                return String(bill.customerName).toLowerCase().includes(q) || String(bill.phone).toLowerCase().includes(q) || String(bill.vehicleModel).toLowerCase().includes(q) || String(bill.vehicleNo).toLowerCase().includes(q); 
            });

            const pendingBills = allBills.filter(bill => parseFloat(bill.balanceDue) > 0);
            const totalPendingAmount = pendingBills.reduce((sum, bill) => sum + parseFloat(bill.balanceDue), 0);
            
            // 🌟 COMPLETED BILLS 🌟
            const completedBills = allBills.filter(bill => parseFloat(bill.balanceDue) === 0);

            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();
            const thisMonthBills = allBills.filter(bill => {
                const bDate = new Date(bill.date);
                return bDate.getMonth() === currentMonth && bDate.getFullYear() === currentYear;
            });
            const monthTotal = thisMonthBills.reduce((sum, bill) => sum + parseFloat(bill.grandTotal || 0), 0);

            const customerHistory = allBills.filter(b => b.phone === phone && phone.length > 5 && b.billId !== editingBillId);

            // ==========================================
            // REUSABLE UI COMPONENTS
            // ==========================================
            
            const HeaderWord = () => (
                <div className="w-full text-center pt-1 pb-1">
                    <span className="font-serif italic font-extrabold text-sm text-yellow-500 tracking-wider">தேவனுக்கே மகிமை</span>
                </div>
            );

            const StatusIndicator = () => (
                <p className={`text-[10px] font-bold ${theme.textMuted} flex items-center gap-1.5`}>
                    <span className={`w-2 h-2 rounded-full ${isSyncing ? 'bg-yellow-400 animate-pulse' : 'bg-emerald-500'}`}></span> 
                    {isSyncing ? 'Syncing...' : 'Online'}
                </p>
            );

            const GearLoader = () => isSubmitting ? (
                <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex flex-col items-center justify-center">
                    <div className="relative w-20 h-20 flex items-center justify-center mb-4">
                        <svg className="absolute w-12 h-12 text-indigo-500 gear-1 ml-5 mb-5" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19.333 14.667a7.25 7.25 0 000-5.334l2.115-1.12c.365-.192.483-.65.234-1.026l-1.576-2.366c-.24-.36-.71-.462-1.066-.226l-2.074 1.38a7.35 7.35 0 00-4.043-2.316V1.33c0-.41-.334-.746-.745-.746H11.82c-.41 0-.745.335-.745.746v2.333a7.35 7.35 0 00-4.043 2.316L4.96 4.601c-.357-.236-.826-.134-1.066.226L2.318 7.193c-.249.375-.13.834.234 1.025l2.115 1.12a7.25 7.25 0 000 5.334l-2.115 1.12c-.364.192-.483.65-.234 1.026l1.576 2.366c.24.36.71.462 1.066.226l2.074-1.38a7.35 7.35 0 004.043 2.316v2.334c0 .41.334.745.745.745h1.358c.41 0 .745-.335.745-.745v-2.334a7.35 7.35 0 004.043-2.316l2.074 1.38c.356.236.826.134 1.066-.226l1.576-2.366c.249-.375.13-.834-.234-1.025l-2.115-1.12zM12 15.5a3.5 3.5 0 110-7 3.5 3.5 0 010 7z" />
                        </svg>
                        <svg className="absolute w-8 h-8 text-cyan-400 gear-2 mr-6 mt-6" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19.333 14.667a7.25 7.25 0 000-5.334l2.115-1.12c.365-.192.483-.65.234-1.026l-1.576-2.366c-.24-.36-.71-.462-1.066-.226l-2.074 1.38a7.35 7.35 0 00-4.043-2.316V1.33c0-.41-.334-.746-.745-.746H11.82c-.41 0-.745.335-.745.746v2.333a7.35 7.35 0 00-4.043 2.316L4.96 4.601c-.357-.236-.826-.134-1.066.226L2.318 7.193c-.249.375-.13.834.234 1.025l2.115 1.12a7.25 7.25 0 000 5.334l-2.115 1.12c-.364.192-.483.65-.234 1.026l1.576 2.366c.24.36.71.462 1.066.226l2.074-1.38a7.35 7.35 0 004.043 2.316v2.334c0 .41.334.745.745.745h1.358c.41 0 .745-.335.745-.745v-2.334a7.35 7.35 0 004.043-2.316l2.074 1.38c.356.236.826.134 1.066-.226l1.576-2.366c.249-.375.13-.834-.234-1.025l-2.115-1.12zM12 15.5a3.5 3.5 0 110-7 3.5 3.5 0 010 7z" />
                        </svg>
                    </div>
                    <p className="text-cyan-300 font-bold text-xs tracking-[0.2em] animate-pulse">PROCESSING...</p>
                </div>
            ) : null;

            const BottomNav = () => (
                <div className={`fixed bottom-0 w-full max-w-md mx-auto inset-x-0 ${theme.glass} border-t flex justify-around p-2 z-40 pb-5`}>
                    <button onClick={() => navigateTo('dashboard')} className={`flex flex-col items-center gap-1 transition-all ${currentScreen === 'dashboard' ? 'text-indigo-500 scale-105 font-bold' : theme.textMuted}`}>
                        <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                        <span className="text-[10px]">All Bills</span>
                    </button>
                    {/* 🌟 NEW COMPLETED TAB 🌟 */}
                    <button onClick={() => navigateTo('completed')} className={`flex flex-col items-center gap-1 transition-all ${currentScreen === 'completed' ? 'text-emerald-500 scale-105 font-bold' : theme.textMuted}`}>
                        <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"></path></svg>
                        <span className="text-[10px]">Completed</span>
                    </button>
                    <button onClick={() => navigateTo('pending')} className={`flex flex-col items-center gap-1 transition-all ${currentScreen === 'pending' ? 'text-pink-500 scale-105 font-bold' : theme.textMuted}`}>
                        <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M4 4a2 2 0 00-2 2v4a2 2 0 002 2V6h10a2 2 0 00-2-2H4zm2 6a2 2 0 012-2h8a2 2 0 012 2v4a2 2 0 01-2 2H8a2 2 0 01-2-2v-4zm6 4a2 2 0 100-4 2 2 0 000 4z" clipRule="evenodd"></path></svg>
                        <span className="text-[10px]">Dues</span>
                    </button>
                    <button onClick={() => navigateTo('search')} className={`flex flex-col items-center gap-1 transition-all ${currentScreen === 'search' ? 'text-indigo-500 scale-105 font-bold' : theme.textMuted}`}>
                        <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clipRule="evenodd"></path></svg>
                        <span className="text-[10px]">Search</span>
                    </button>
                </div>
            );

            const Fab = () => (
                <button onClick={resetForm} className={`fixed bottom-20 right-4 w-14 h-14 ${theme.primaryGradient} rounded-full flex items-center justify-center text-white text-3xl glow-button active:scale-95 transition-all z-40 border border-white/20 shadow-xl pb-1`}>
                    +
                </button>
            );

            const BillListItem = ({ bill }) => {

                                <div className="bg-gradient-to-r from-violet-600 to-indigo-700 p-5 text-center text-white rounded-t-2xl">
                                    <h1 className="text-2xl font-black tracking-wider uppercase mb-1">மேரி</h1>
                                    <p className="text-base font-bold tracking-widest uppercase opacity-90 mb-1">டூவீலர் ஒர்க்ஸ்</p>
                                    <p className="text-xs opacity-90 font-medium">ஆத்துகடை தெரு</p>
                                    <p className="text-xs opacity-90 font-medium">திருவில்லிபுத்தூர்</p>
                                    <p className="text-xs font-bold opacity-90 mt-1.5">தொடர்பு:- 9585652521, 63800 90774</p> 
                                    <div className="mt-4 p-3 bg-black/20 rounded-xl border border-white/10">
                                        <p className="text-sm font-bold mb-1.5 leading-relaxed">{currentVerse.tamil}</p>
                                        <p className="text-[10px] italic font-serif opacity-80">{currentVerse.text} - {currentVerse.ref}</p>
                                    </div>
                                </div>

                                <div className="p-5 border-b border-dashed border-slate-200 bg-slate-50 text-sm">
                                    <p className="text-slate-500 mb-1.5 font-medium">Name: <span className="text-slate-900 font-bold ml-1">{customerName || 'Unknown'}</span></p>
                                    <p className="text-slate-500 mb-1.5 font-medium">Vehicle: <span className="text-slate-900 font-bold ml-1">{vehicleModel || 'Unknown'} {vehicleNo ? `- ${vehicleNo}` : ''}</span></p>
                                    <p className="text-slate-500 font-medium">Date: <span className="text-slate-900 font-bold ml-1">{new Date(billDate).toLocaleDateString()}</span></p>
                                </div>

                                <div className="p-5">
                                    {items.map((item, index) => (
                                        <div key={index} className="flex justify-between text-sm text-slate-800 mb-2 font-bold">
                                            <span>{item.name}</span><span className="text-base">₹{item.price.toFixed(2)}</span>
                                        </div>
                                    ))}
                                    {cooli && (
                                        <div className="flex justify-between text-sm text-slate-800 mb-2 mt-4 pt-4 border-t border-slate-100 font-bold">
                                            <span>Cooli (Labor)</span><span className="text-base">₹{parseFloat(cooli).toFixed(2)}</span>
                                        </div>
                                    )}
                                </div>

                                <div className="bg-slate-900 p-5 text-white rounded-b-2xl">
                                    <div className="flex justify-between text-lg font-black mb-2"><span>Grand Total</span><span>₹{grandTotal.toFixed(2)}</span></div>
                                    <div className="flex justify-between text-sm font-bold text-slate-400 mb-1"><span>Advance / Paid</span><span className="text-emerald-400">₹{currentAdvance.toFixed(2)}</span></div>
                                    {balanceDue > 0 && (
                                        <div className="flex justify-between text-xl font-black mt-3 pt-3 border-t border-slate-700 text-pink-500">
                                            <span>Balance Due</span><span>₹{balanceDue.toFixed(2)}</span>
                                        </div>
                                    )}
                                    {balanceDue > 0 && (
                                        <div className="bg-white mt-5 p-3 rounded-xl flex flex-col items-center justify-center text-center">
                                            <div className="w-28 h-28 bg-white flex items-center justify-center mb-2"><img src={qrUrl} alt="Scan to Pay" crossOrigin="anonymous" className="w-full h-full object-cover" /></div>
                                            <p className="text-slate-800 text-xs font-black">Scan to pay balance: ₹{balanceDue}</p>
                                        </div>
                                    )}
                                </div>
                                <div className="bg-white pt-4 text-center border-0">
                                    <p className="text-slate-600 font-bold text-sm m-0">நன்றி! மீண்டும் வருக!</p>
                                </div>
                            </div>

                            <div className="mt-6 flex gap-2">
                                <button onClick={() => navigateTo('dashboard')} className={`w-1/4 ${theme.card} ${theme.text} font-bold text-sm py-3.5 rounded-xl active:scale-95 transition-transform shadow-sm`}>Home</button>
                                <button onClick={() => { playSound('click'); navigateTo('newBill'); }} className={`w-1/4 ${isDarkMode ? 'bg-indigo-500/20 text-indigo-400 border border-indigo-500/30' : 'bg-indigo-100 text-indigo-600 border border-indigo-300'} font-bold text-sm py-3.5 rounded-xl active:scale-95 transition-transform shadow-sm`}>✏️ Edit</button>
                                <button onClick={handleShare} className="flex-1 bg-gradient-to-r from-emerald-400 to-emerald-500 text-slate-900 font-black text-base py-3.5 rounded-xl glow-button active:scale-95 transition-transform shadow-md">
                                    Share Bill
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
